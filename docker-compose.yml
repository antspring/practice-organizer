services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practice-organizer-api
    restart: on-failure
    depends_on:
      - postgres
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      MAIL_ENABLED: ${MAIL_ENABLED}
      MAIL_FROM: ${MAIL_FROM}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      LOCAL_STORAGE_ROOT: /app/uploads
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - report_uploads:/app/uploads

  postgres:
    image: postgres:18-alpine
    container_name: practice-organizer-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
  report_uploads:
